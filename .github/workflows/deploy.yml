name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main # Agar aapki branch ka naam 'master' hai, toh use badal lijiye

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy files to EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "index.html,Dockerfile"
          target: "/home/ubuntu/frontend-app"

      - name: SSH into EC2 and Run Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/frontend-app
            # Purana container stop aur remove karna (agar hai toh)
            sudo docker stop url-frontend || true
            sudo docker rm url-frontend || true
            # Nayi image build karna
            sudo docker build -t my-url-frontend .
            # Naya container run karna
            sudo docker run -d -p 80:80 --name url-frontend my-url-frontend