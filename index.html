<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔗 Link Shortener</h2>
        <p>Apna URL yahan paste karein:</p>
        
        <input type="text" id="longUrl" placeholder="https://www.example.com">
        <button onclick="shortenMyUrl()">Shorten URL</button>

        <p id="result"></p>
    </div>

    <script>
        async function shortenMyUrl() {
            const longUrlInput = document.getElementById('longUrl').value;
            const resultBox = document.getElementById('result');
            
            if (!longUrlInput) {
                resultBox.innerHTML = "<span style='color:red;'>Bhai, pehle koi link toh daalo!</span>";
                return;
            }

            resultBox.innerHTML = "Processing...";

           
            const apiUrl = "https://u5um8ie3k4.execute-api.ap-south-1.amazonaws.com";

            try {
                
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ long_url: longUrlInput })
                });

                const data = await response.json();

                if (response.ok) {
                   
                    resultBox.innerHTML = `Lijiye aapka short aur unique link: <br><br> <a href="${data.short_url}" target="_blank">${data.short_url}</a>`;
                } else {
                    resultBox.innerHTML = "<span style='color:red;'>Kuch gadbad ho gayi server par.</span>";
                }

            } catch (error) {
                resultBox.innerHTML = "<span style='color:red;'>Error: Server se connect nahi ho paya.</span>";
            }
        }
    </script>

</body>
</html>
