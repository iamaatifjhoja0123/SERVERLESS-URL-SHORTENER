<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium URL Shortener</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .header-icon {
            font-size: 40px;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        h2 {
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
        }

        input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            font-size: 15px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button.btn-main {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        button.btn-main:hover {
            background-color: var(--primary-hover);
        }

        button.btn-main:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        #result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #F3F4F6;
            display: none;
            flex-direction: column;
            gap: 10px;
            word-break: break-all;
            border: 1px dashed #D1D5DB;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .short-link {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }

        .short-link:hover {
            text-decoration: underline;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-copy, .btn-visit {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .btn-copy { background: #10B981; color: white; }
        .btn-copy:hover { background: #059669; }
        
        .btn-visit { background: #374151; color: white; text-decoration: none; }
        .btn-visit:hover { background: #1F2937; }

        .error-msg {
            color: #EF4444;
            font-size: 14px;
            font-weight: 500;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <i class="fa-solid fa-link header-icon"></i>
        <h2>URL Shortener</h2>
        <p class="subtitle">Enter your long URL below to create a concise, shareable link.</p>
        
        <div class="input-group">
            <i class="fa-solid fa-globe"></i>
            <input type="url" id="longUrl" placeholder="https://www.your-long-website-url.com">
        </div>
        
        <button id="submitBtn" class="btn-main" onclick="shortenMyUrl()">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Shorten URL
        </button>

        <div id="error-msg" class="error-msg"></div>

        <div id="result-box">
            <span style="font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase;">Your Short Link</span>
            <a href="#" id="short-link-anchor" class="short-link" target="_blank"></a>
            
            <div class="action-buttons">
                <button class="btn-copy" onclick="copyToClipboard()">
                    <i class="fa-solid fa-copy"></i> Copy
                </button>
                <a href="#" id="visit-btn" class="btn-visit" target="_blank">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> Visit
                </a>
            </div>
        </div>
    </div>

    <script>
        async function shortenMyUrl() {
            const longUrlInput = document.getElementById('longUrl').value.trim();
            const resultBox = document.getElementById('result-box');
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submitBtn');
            const shortLinkAnchor = document.getElementById('short-link-anchor');
            const visitBtn = document.getElementById('visit-btn');

            // Reset UI
            resultBox.style.display = "none";
            errorMsg.style.display = "none";

            if (!longUrlInput) {
                showError("Please enter a valid URL first.");
                return;
            }

            // Validating basic URL structure
            if (!longUrlInput.startsWith("http://") && !longUrlInput.startsWith("https://")) {
                showError("URL must start with http:// or https://");
                return;
            }

            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Shortening...';

            const apiUrl = "https://u5um8ie3k4.execute-api.ap-south-1.amazonaws.com";

            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ long_url: longUrlInput })
                });

                const data = await response.json();

                if (response.ok && data.short_url) {
                    shortLinkAnchor.href = data.short_url;
                    shortLinkAnchor.innerText = data.short_url;
                    visitBtn.href = data.short_url;
                    resultBox.style.display = "flex";
                } else {
                    showError("Something went wrong on the server.");
                }
            } catch (error) {
                showError("Error: Unable to connect to the server.");
            } finally {
                // Reset button state
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Shorten URL';
            }
        }

        function showError(message) {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.innerText = message;
            errorMsg.style.display = "block";
        }

        function copyToClipboard() {
            const shortUrl = document.getElementById('short-link-anchor').innerText;
            navigator.clipboard.writeText(shortUrl).then(() => {
                const copyBtn = document.querySelector('.btn-copy');
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                copyBtn.style.background = "#059669";
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.style.background = "#10B981";
                }, 2000);
            });
        }
    </script>
</body>
</html>
